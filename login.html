<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindSphere Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
}

.container{
background:white;
width:400px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#4f46e5;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#3730a3;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#4f46e5;
text-decoration:none;
}

</style>

</head>
<body>

<div class="container">

<h1>🧠 MindSphere</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

<script>

function login(){

let username =
document.getElementById("username").value;

let password =
document.getElementById("password").value;

if(username==="" || password===""){

alert("Please enter username and password");

return;

}

alert("Login Successful!");

window.location.href="index.html";

}

</script>

</body>
</html>
